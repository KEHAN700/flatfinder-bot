services:
  - type: web
    name: estate-bot
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m database.seed && python bot.py"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: NOTIFY_INTERVAL_MIN
        value: "5"
      - key: DB_URL
        sync: false
